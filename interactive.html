<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planarity Interactive Training</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 10px;
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
    }
    .controls {
      margin-bottom: 10px;
      padding: 10px;
      background: #333;
      border-radius: 5px;
    }
    .controls button {
      padding: 8px 16px;
      margin-right: 10px;
      cursor: pointer;
    }
    .controls button.active {
      background: #4a4;
      color: white;
    }
    .controls label {
      margin-right: 20px;
    }
    .main-container {
      display: flex;
      gap: 15px;
      height: calc(100vh - 70px);
    }
    .puzzle {
      flex: 1;
      background: #fff;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .puzzle svg {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .puzzle-header {
      background: #333;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    .puzzle-header.solved {
      background: #060;
    }
    .puzzle-header.stuck {
      background: #600;
    }
    .side-panel {
      width: 140px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .side-panel button {
      padding: 12px 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #555;
      border-radius: 4px;
      background: #444;
      color: #fff;
    }
    .side-panel button:hover {
      background: #555;
    }
    .side-panel .section-label {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      text-transform: uppercase;
    }
    .side-panel .history-row {
      display: flex;
      gap: 4px;
    }
    .side-panel .history-row button {
      flex: 1;
      padding: 8px 4px;
    }
    circle { cursor: default; }
  </style>
</head>
<body>
  <div class="controls">
    <label>Nodes: <input type="number" id="num-nodes" value="30" min="10" max="100" style="width:50px"></label>
    <button id="reset-btn">New Graph</button>
    <label style="margin-left: 15px;"><input type="checkbox" id="show-numbers"> Show vertex #</label>
    <label style="margin-left: 15px;"><input type="checkbox" id="pause-on-escape" checked> Pause on escape</label>
    <span id="status" style="margin-left: 20px;"></span>
  </div>
  
  <div class="main-container">
    <div class="puzzle" id="puzzle-container"></div>
    
    <div class="side-panel">
      <div class="section-label">Solver</div>
      <button id="btn-step">Step</button>
      <button id="btn-run">Run</button>
      <button id="btn-compact">Compact</button>
      <button id="btn-consolidate">Consolidate</button>
      
      <div class="section-label">History</div>
      <div class="history-row">
        <button id="btn-back">&larr;</button>
        <button id="btn-forward">&rarr;</button>
      </div>
      
      <div class="section-label">Speed</div>
      <input type="range" id="speed" min="1" max="100" value="50" style="width:100%">
    </div>
  </div>
  
  <input type="hidden" id="num-puzzles" value="1">

  <script src="solver.js"></script>
  <script>
    console.log('Dashboard script starting...');
    
    // In Electron, Solver might need to be loaded via require
    var Solver = window.Solver;
    var ipcRenderer = null;
    if (typeof require !== 'undefined') {
      try {
        Solver = require('./solver.js');
        console.log('Loaded Solver via require');
        var electron = require('electron');
        ipcRenderer = electron.ipcRenderer;
        console.log('IPC renderer available');
      } catch(e) {
        console.error('Could not require modules:', e);
      }
    }
    console.log('Solver object:', typeof Solver, Solver ? Object.keys(Solver) : 'undefined');
    
    // Import from shared solver
    var intersections = Solver.intersections;
    var planarGraph = Solver.planarGraph;
    var scramble = Solver.scramble;
    var getNeighbors = Solver.getNeighbors;
    var solverStepCore = Solver.solverStep;
    var findClumps = Solver.findClumps;
    var findEscapeMove = Solver.findEscapeMove;
    var findCompactMove = Solver.findCompactMove;
    var findRelocateMove = Solver.findRelocateMove;
    var findConsolidateMove = Solver.findConsolidateMove;
    
    // ============ HISTORY MANAGEMENT ============
    
    function saveState(puzzle) {
      // Save current vertex positions
      var positions = puzzle.graph.nodes.map(function(n) { return [n[0], n[1]]; });
      
      // If we're in the middle of history, truncate forward history
      if (puzzle.historyIndex < puzzle.history.length - 1) {
        puzzle.history = puzzle.history.slice(0, puzzle.historyIndex + 1);
      }
      
      puzzle.history.push({
        positions: positions,
        crossings: puzzle.count,
        strategy: puzzle.lastStrategy,
        movingNode: puzzle.movingNodeIndex
      });
      puzzle.historyIndex = puzzle.history.length - 1;
    }
    
    function restoreState(puzzle, index) {
      if (index < 0 || index >= puzzle.history.length) return false;
      
      var state = puzzle.history[index];
      puzzle.graph.nodes.forEach(function(node, i) {
        node[0] = state.positions[i][0];
        node[1] = state.positions[i][1];
      });
      puzzle.historyIndex = index;
      puzzle.count = intersections(puzzle.graph.links);
      puzzle.lastStrategy = state.strategy || '-';
      puzzle.movingNodeIndex = state.movingNode;
      renderPuzzle(puzzle);
      return true;
    }
    
    function goBack(puzzle) {
      if (puzzle.historyIndex > 0) {
        restoreState(puzzle, puzzle.historyIndex - 1);
        updateStatus();
        saveStateToFile(puzzle);
      }
    }
    
    function goForward(puzzle) {
      if (puzzle.historyIndex < puzzle.history.length - 1) {
        restoreState(puzzle, puzzle.historyIndex + 1);
        updateStatus();
        saveStateToFile(puzzle);
      }
    }
    
    // ============ ANIMATE MOVE ============
    
    function animateMove(puzzle, node, fromX, fromY, toX, toY, callback) {
      var duration = 200; // ms
      var startTime = Date.now();
      var nodeIndex = puzzle.graph.nodes.indexOf(node);
      puzzle.movingNodeIndex = nodeIndex;
      
      function frame() {
        var elapsed = Date.now() - startTime;
        var t = Math.min(1, elapsed / duration);
        t = t * (2 - t); // ease out
        
        node[0] = fromX + (toX - fromX) * t;
        node[1] = fromY + (toY - fromY) * t;
        
        intersections(puzzle.graph.links);
        renderPuzzle(puzzle);
        
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          node[0] = toX;
          node[1] = toY;
          puzzle.movingNodeIndex = -1;
          if (callback) callback();
        }
      }
      
      requestAnimationFrame(frame);
    }
    
    // ============ EXECUTE SOLVER STEP ============
    // Uses the same solver logic as the dashboard (from solver.js)
    
    function executeStep(puzzle, callback) {
      var graph = puzzle.graph;
      puzzle.count = intersections(graph.links);
      
      if (puzzle.count === 0) {
        puzzle.status = 'solved';
        if (callback) callback(false);
        return;
      }
      
      // Use shared solver step from solver.js
      puzzle.solverState = puzzle.solverState || {};
      
      // Check if we should pause before escape moves
      var pauseOnEscape = document.getElementById('pause-on-escape').checked;
      puzzle.solverState.pauseBeforeEscape = pauseOnEscape;
      
      var result = solverStepCore(graph, puzzle.solverState);
      
      if (result.done) {
        puzzle.status = 'solved';
        puzzle.count = 0;
        renderPuzzle(puzzle);
        updateStatus();
        if (callback) callback(false);
        return;
      }
      
      if (result.wouldEscape) {
        // Solver would make an escape move - pause for human intervention
        puzzle.status = 'escape-paused';
        puzzle.escapeStuckCount = result.stuckCount;
        renderPuzzle(puzzle);
        updateStatus();
        // Stop the solver loop
        if (callback) callback(false);
        return;
      }
      
      if (result.stuck) {
        puzzle.status = 'stuck';
        renderPuzzle(puzzle);
        updateStatus();
        if (callback) callback(false);
        return;
      }
      
      if (result.move) {
        var move = result.move;
        var nodeIndex = graph.nodes.indexOf(move.node);
        
        // The solver already applied the move, so we need to undo it for animation
        var toX = move.node[0];
        var toY = move.node[1];
        move.node[0] = move.fromX;
        move.node[1] = move.fromY;
        
        puzzle.moves++;
        puzzle.lastStrategy = move.strategy;
        puzzle.count = result.count;
        
        animateMove(puzzle, move.node, move.fromX, move.fromY, toX, toY, function() {
          // Log move
          logMove(puzzle.moves, nodeIndex, toX, toY, puzzle.count, move.strategy, null);
          
          saveState(puzzle);
          updateStatus();
          // Keep running as long as we made a move (escape moves may not "improve" but should continue)
          if (callback) callback(true);
        });
      } else {
        // No move found at all
        if (callback) callback(false);
      }
    }
    
    // ============ RENDERING ============
    
    function renderPuzzle(puzzle) {
      var svg = puzzle.svg;
      var w = puzzle.width, h = puzzle.height;
      var graph = puzzle.graph;
      puzzle.count = intersections(graph.links);
      
      var scaleX = function(v) { return 10 + v * (w - 20); };
      var scaleY = function(v) { return 10 + v * (h - 20); };
      
      // Clear
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      
      // Edges
      graph.links.forEach(function(link) {
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', scaleX(link[0][0]));
        line.setAttribute('y1', scaleY(link[0][1]));
        line.setAttribute('x2', scaleX(link[1][0]));
        line.setAttribute('y2', scaleY(link[1][1]));
        line.setAttribute('stroke', link.intersection ? '#000' : '#fc0');
        line.setAttribute('stroke-width', '0.6');
        svg.appendChild(line);
      });
      
      // Nodes
      graph.nodes.forEach(function(node, i) {
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', scaleX(node[0]));
        circle.setAttribute('cy', scaleY(node[1]));
        
        // Determine state: moving, selected, or normal
        var isMoving = (i === puzzle.movingNodeIndex);
        var isSelected = (i === selectedNodeIndex);
        
        if (isMoving) {
          circle.setAttribute('r', '4');
          circle.setAttribute('fill', '#f00');
          circle.setAttribute('stroke', '#900');
          circle.setAttribute('stroke-width', '1.5');
        } else if (isSelected) {
          circle.setAttribute('r', '4');
          circle.setAttribute('fill', node.intersection ? '#f0f' : '#0f0');
          circle.setAttribute('stroke', '#fff');
          circle.setAttribute('stroke-width', '1.5');
        } else {
          circle.setAttribute('r', '2.5');
          circle.setAttribute('fill', node.intersection ? '#0cf' : '#fc0');
          circle.setAttribute('stroke', '#000');
          circle.setAttribute('stroke-width', '0.3');
        }
        circle.style.cursor = 'pointer';
        
        // Add handlers
        (function(n, idx) {
          // Left click = drag
          circle.addEventListener('mousedown', function(e) {
            if (e.button === 0) {
              e.preventDefault();
              startDrag(puzzle, n, idx, e);
            }
          });
          // Right click = select
          circle.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            selectNode(puzzle, idx);
          });
        })(node, i);
        
        svg.appendChild(circle);
      });
      
      // Draw vertex numbers if enabled
      var showNumbers = document.getElementById('show-numbers') && document.getElementById('show-numbers').checked;
      if (showNumbers) {
        graph.nodes.forEach(function(node, i) {
          var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', scaleX(node[0]) + 5);
          text.setAttribute('y', scaleY(node[1]) - 5);
          text.setAttribute('font-size', '10');
          text.setAttribute('fill', '#333');
          text.setAttribute('font-weight', 'bold');
          text.setAttribute('pointer-events', 'none');
          text.textContent = i;
          svg.appendChild(text);
        });
      }
      
      // Update header - show current position and head position (0-indexed)
      // If X < Y, you're rewound. If X = Y, you're at head.
      var currentPos = puzzle.historyIndex;
      var headPos = puzzle.history.length - 1;
      var moveDisplay = currentPos + '/' + headPos;
      
      var header = puzzle.header;
      header.className = 'puzzle-header' + (puzzle.status === 'solved' ? ' solved' : (puzzle.status === 'stuck' ? ' stuck' : ''));
      header.innerHTML = '<span>P' + puzzle.id + ' | ' + puzzle.count + ' crossings | move ' + moveDisplay + '</span><span>' + (puzzle.lastStrategy || '-') + '</span>';
    }
    
    // ============ SELECTION AND STATE ============
    
    var selectedNodeIndex = -1;
    
    function selectNode(puzzle, nodeIndex) {
      selectedNodeIndex = nodeIndex;
      renderPuzzle(puzzle);
      try { saveStateToFile(puzzle); } catch(e) { console.error('saveStateToFile error:', e); }
    }
    
    function saveStateToFile(puzzle) {
      if (!puzzle) return;
      
      var graph = puzzle.graph;
      intersections(graph.links);
      var clumps = findClumps(graph);
      
      var state = {
        timestamp: new Date().toISOString(),
        currentPosition: puzzle.historyIndex,
        headPosition: puzzle.history.length - 1,
        moves: puzzle.moves,
        crossings: puzzle.count,
        totalVertices: graph.nodes.length,
        conflictFree: graph.nodes.filter(function(n) { return !n.intersection; }).length,
        clumps: clumps.length,
        largestClump: clumps.length > 0 ? clumps[0].length : 0,
        selectedVertex: selectedNodeIndex,
        selectedInfo: null,
        vertices: graph.nodes.map(function(n, i) {
          var neighbors = getNeighbors(graph, n);
          // Count crossings involving this vertex's edges
          var crossingCount = 0;
          graph.links.forEach(function(link) {
            if ((link[0] === n || link[1] === n) && link.intersection) {
              // Count how many other edges this edge crosses
              graph.links.forEach(function(other) {
                if (other !== link && Solver.intersect(link, other)) {
                  crossingCount++;
                }
              });
            }
          });
          return {
            index: i,
            x: n[0],
            y: n[1],
            hasConflict: n.intersection,
            neighborCount: neighbors.length,
            crossingCount: crossingCount,
            neighborIndices: neighbors.map(function(nb) { return graph.nodes.indexOf(nb); })
          };
        })
      };
      
      // Add selected vertex details
      if (selectedNodeIndex >= 0 && selectedNodeIndex < graph.nodes.length) {
        var selNode = graph.nodes[selectedNodeIndex];
        var neighbors = getNeighbors(graph, selNode);
        
        // Calculate anchor score (how spread out are neighbors?) and gap direction
        var anchorScore = 0;
        var gapDirection = null; // angle pointing toward the largest gap (where vertex can move)
        var gapSize = 0;
        if (neighbors.length >= 2) {
          var angles = neighbors.map(function(nb) {
            return Math.atan2(nb[1] - selNode[1], nb[0] - selNode[0]);
          });
          angles.sort(function(a, b) { return a - b; });
          var maxGap = 0;
          var maxGapStart = 0;
          for (var i = 0; i < angles.length; i++) {
            var gap = angles[(i + 1) % angles.length] - angles[i];
            if (i === angles.length - 1) gap += Math.PI * 2;
            if (gap > maxGap) {
              maxGap = gap;
              maxGapStart = angles[i];
            }
          }
          // Anchor score: 1 = well anchored (neighbors spread), 0 = poorly anchored (neighbors clustered)
          anchorScore = 1 - (maxGap / (Math.PI * 2));
          gapSize = maxGap;
          // Direction pointing to center of the gap (where vertex can move freely)
          gapDirection = maxGapStart + maxGap / 2;
          // Normalize to -PI to PI
          while (gapDirection > Math.PI) gapDirection -= Math.PI * 2;
          while (gapDirection < -Math.PI) gapDirection += Math.PI * 2;
        }
        
        // Count crossings for selected vertex
        var selCrossingCount = 0;
        graph.links.forEach(function(link) {
          if ((link[0] === selNode || link[1] === selNode) && link.intersection) {
            graph.links.forEach(function(other) {
              if (other !== link && Solver.intersect(link, other)) {
                selCrossingCount++;
              }
            });
          }
        });
        
        // Convert gap direction to human-readable
        var gapDirectionLabel = null;
        if (gapDirection !== null) {
          var deg = gapDirection * 180 / Math.PI;
          if (deg > -22.5 && deg <= 22.5) gapDirectionLabel = 'right';
          else if (deg > 22.5 && deg <= 67.5) gapDirectionLabel = 'down-right';
          else if (deg > 67.5 && deg <= 112.5) gapDirectionLabel = 'down';
          else if (deg > 112.5 && deg <= 157.5) gapDirectionLabel = 'down-left';
          else if (deg > 157.5 || deg <= -157.5) gapDirectionLabel = 'left';
          else if (deg > -157.5 && deg <= -112.5) gapDirectionLabel = 'up-left';
          else if (deg > -112.5 && deg <= -67.5) gapDirectionLabel = 'up';
          else if (deg > -67.5 && deg <= -22.5) gapDirectionLabel = 'up-right';
        }
        
        state.selectedInfo = {
          index: selectedNodeIndex,
          x: selNode[0].toFixed(3),
          y: selNode[1].toFixed(3),
          hasConflict: selNode.intersection,
          neighborCount: neighbors.length,
          crossingCount: selCrossingCount,
          anchorScore: anchorScore.toFixed(2),
          gapSizeDeg: gapSize ? (gapSize * 180 / Math.PI).toFixed(0) : null,
          gapDirection: gapDirectionLabel
        };
      }
      
      // Send state via IPC to main process (primary method)
      if (ipcRenderer) {
        ipcRenderer.send('state-update', state);
        console.log('State sent via IPC');
      }
      
      // Also write to file as backup
      if (typeof require !== 'undefined') {
        try {
          var fs = require('fs');
          var path = require('path');
          var filePath = path.join(__dirname || '.', 'dashboard-state.json');
          fs.writeFileSync(filePath, JSON.stringify(state, null, 2));
        } catch(e) {
          console.log('Could not save state file:', e.message);
        }
      }
    }
    
    // ============ MOVE HISTORY LOGGING ============
    
    var sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    var historyFilePath = null;
    
    function getHistoryFilePath() {
      if (historyFilePath) return historyFilePath;
      if (typeof require === 'undefined') return null;
      var path = require('path');
      historyFilePath = path.join(__dirname || '.', 'move-history.jsonl');
      return historyFilePath;
    }
    
    function logInitialState(puzzle) {
      var graph = puzzle.graph;
      var entry = {
        type: 'init',
        ts: new Date().toISOString(),
        session: sessionId,
        nodes: graph.nodes.map(function(n) { 
          return [parseFloat(n[0].toFixed(4)), parseFloat(n[1].toFixed(4))]; 
        }),
        edges: graph.links.map(function(l) {
          return [graph.nodes.indexOf(l[0]), graph.nodes.indexOf(l[1])];
        }),
        crossings: puzzle.count
      };
      
      // Reset history via IPC
      if (ipcRenderer) {
        ipcRenderer.send('history-reset');
        ipcRenderer.send('move-log', entry);
      }
      
      // Also write to file (backup)
      if (typeof require !== 'undefined') {
        try {
          var fs = require('fs');
          var filePath = getHistoryFilePath();
          fs.writeFileSync(filePath, '');
          fs.appendFileSync(filePath, JSON.stringify(entry) + '\n');
        } catch(e) {
          console.log('Could not log initial state to file:', e.message);
        }
      }
      
      console.log('Initial state logged:', entry.nodes.length, 'nodes,', entry.edges.length, 'edges,', entry.crossings, 'crossings');
    }
    
    function logMove(moveNum, vertexIdx, toX, toY, crossingsAfter, source, alternatives) {
      var entry = {
        type: 'move',
        ts: new Date().toISOString(),
        n: moveNum,
        v: vertexIdx,
        to: [parseFloat(toX.toFixed(4)), parseFloat(toY.toFixed(4))],
        x: crossingsAfter,
        src: source
      };
      
      if (alternatives && Object.keys(alternatives).length > 0) {
        entry.alt = alternatives;
      }
      
      // Send via IPC (primary)
      if (ipcRenderer) {
        ipcRenderer.send('move-log', entry);
      }
      
      // Also write to file (backup)
      if (typeof require !== 'undefined') {
        try {
          var fs = require('fs');
          var filePath = getHistoryFilePath();
          fs.appendFileSync(filePath, JSON.stringify(entry) + '\n');
        } catch(e) {
          console.log('Could not log move to file:', e.message);
        }
      }
      
      console.log('Move logged:', entry);
    }
    
    // Legacy wrapper for compatibility
    function logMoveHistory(moveNum, vertexIdx, fromX, fromY, toX, toY, crossingsBefore, crossingsAfter, source) {
      logMove(moveNum, vertexIdx, toX, toY, crossingsAfter, source, null);
    }
    
    // ============ DRAG AND DROP ============
    
    var dragState = {
      active: false,
      node: null,
      nodeIndex: -1,
      startX: 0,
      startY: 0,
      offsetX: 0,
      offsetY: 0,
      puzzle: null
    };
    
    function startDrag(puzzle, node, nodeIndex, event) {
      if (running) return; // Don't drag while auto-running
      
      var svg = puzzle.svg;
      var rect = svg.getBoundingClientRect();
      
      // Calculate where the mouse clicked in normalized coords
      var mouseX = event.clientX - rect.left;
      var mouseY = event.clientY - rect.top;
      var viewBox = svg.viewBox.baseVal;
      var scaleX = viewBox.width / rect.width;
      var scaleY = viewBox.height / rect.height;
      var svgX = mouseX * scaleX;
      var svgY = mouseY * scaleY;
      var w = puzzle.width, h = puzzle.height;
      var clickNormX = (svgX - 10) / (w - 20);
      var clickNormY = (svgY - 10) / (h - 20);
      
      // Store offset between click position and node position (prevents jump)
      dragState.offsetX = node[0] - clickNormX;
      dragState.offsetY = node[1] - clickNormY;
      
      dragState.active = true;
      dragState.node = node;
      dragState.nodeIndex = nodeIndex;
      dragState.startX = node[0];
      dragState.startY = node[1];
      dragState.puzzle = puzzle;
      
      puzzle.movingNodeIndex = nodeIndex;
      renderPuzzle(puzzle);
    }
    
    function handleDrag(event) {
      if (!dragState.active) return;
      
      var puzzle = dragState.puzzle;
      var svg = puzzle.svg;
      var rect = svg.getBoundingClientRect();
      
      // Convert mouse position to normalized coordinates
      var mouseX = event.clientX - rect.left;
      var mouseY = event.clientY - rect.top;
      
      // Account for viewBox scaling
      var viewBox = svg.viewBox.baseVal;
      var scaleX = viewBox.width / rect.width;
      var scaleY = viewBox.height / rect.height;
      
      var svgX = mouseX * scaleX;
      var svgY = mouseY * scaleY;
      
      // Convert to normalized 0-1 coordinates
      var w = puzzle.width, h = puzzle.height;
      var normX = (svgX - 10) / (w - 20) + dragState.offsetX;
      var normY = (svgY - 10) / (h - 20) + dragState.offsetY;
      
      // Clamp to bounds
      normX = Math.max(0.02, Math.min(0.98, normX));
      normY = Math.max(0.02, Math.min(0.98, normY));
      
      dragState.node[0] = normX;
      dragState.node[1] = normY;
      
      intersections(puzzle.graph.links);
      renderPuzzle(puzzle);
      updateStatus();
    }
    
    function endDrag() {
      if (!dragState.active) return;
      
      var puzzle = dragState.puzzle;
      var node = dragState.node;
      var fromX = dragState.startX;
      var fromY = dragState.startY;
      var toX = node[0];
      var toY = node[1];
      
      puzzle.movingNodeIndex = -1;
      puzzle.moves++;
      puzzle.lastStrategy = 'manual';
      
      // Reset solver stuck state after manual move
      if (puzzle.solverState) {
        puzzle.solverState.stuckCount = 0;
      }
      puzzle.status = 'running';
      
      // Log the move for analysis
      var crossingsBefore = (puzzle.history && puzzle.history[puzzle.historyIndex]) 
        ? puzzle.history[puzzle.historyIndex].crossings 
        : puzzle.count;
      var crossingsAfter = intersections(puzzle.graph.links);
      var improvement = crossingsBefore - crossingsAfter;
      
      console.log('Move #' + puzzle.moves + ': node ' + dragState.nodeIndex + 
        ' from (' + fromX.toFixed(3) + ',' + fromY.toFixed(3) + ')' +
        ' to (' + toX.toFixed(3) + ',' + toY.toFixed(3) + ')' +
        ' | crossings: ' + crossingsBefore + ' -> ' + crossingsAfter +
        ' (' + (improvement >= 0 ? '+' : '') + improvement + ')');
      
      // Log to move history file
      logMoveHistory(puzzle.moves, dragState.nodeIndex, fromX, fromY, toX, toY, crossingsBefore, crossingsAfter, 'manual');
      
      // Save state after drag
      saveState(puzzle);
      
      dragState.active = false;
      dragState.node = null;
      dragState.puzzle = null;
      
      renderPuzzle(puzzle);
      updateStatus();
      try { saveStateToFile(puzzle); } catch(e) { console.error('saveStateToFile error:', e); }
    }
    
    // Global mouse handlers
    document.addEventListener('mousemove', handleDrag);
    document.addEventListener('mouseup', endDrag);
    
    // ============ MAIN ============
    
    var puzzles = [];        // Displayed puzzles
    var backgroundPuzzles = []; // Additional puzzles running in background
    var running = false;
    var intervalId = null;
    var stats = { totalSolved: 0, totalStuck: 0, totalMoves: 0, bestSolve: Infinity, strategyTotals: {} };
    
    function createPuzzles() {
      try {
        console.log('createPuzzles starting...');
        var numNodes = parseInt(document.getElementById('num-nodes').value) || 40;
        var container = document.getElementById('puzzle-container');
        container.innerHTML = '';
        puzzles = [];
        running = false;
        document.getElementById('btn-run').textContent = 'Run';
        
        var header = document.createElement('div');
        header.className = 'puzzle-header';
        header.textContent = 'New puzzle';
        container.appendChild(header);
        
        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 600 500');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        container.appendChild(svg);
        
        console.log('Creating graph...');
        var graph = scramble(planarGraph(numNodes));
        console.log('Graph created with', graph.nodes.length, 'nodes');
        
        var puzzle = {
          id: 0,
          graph: graph,
          svg: svg,
          header: header,
          width: 600,
          height: 500,
          count: 0,
          moves: 0,
          status: 'running',
          lastStrategy: null,
          stuckCount: 0,
          history: [],
          historyIndex: -1,
          movingNodeIndex: -1
        };
        puzzles.push(puzzle);
        puzzle.count = intersections(graph.links);
        selectedNodeIndex = -1;
        
        // Generate new session ID and log initial state
        sessionId = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        historyFilePath = null;
        logInitialState(puzzle);
        
        saveState(puzzle);
        console.log('Rendering...');
        renderPuzzle(puzzle);
        updateStatus();
        console.log('createPuzzles done');
        try { saveStateToFile(puzzle); } catch(e) { console.error('saveStateToFile error:', e); }
      } catch(e) {
        console.error('createPuzzles error:', e);
      }
    }
    
    function stepAll(callback) {
      if (puzzles.length === 0) {
        if (callback) callback(false);
        return;
      }
      
      var puzzle = puzzles[0];
      if (puzzle.status !== 'running' || puzzle.animating) {
        if (callback) callback(false);
        return;
      }
      
      puzzle.animating = true;
      executeStep(puzzle, function(continued) {
        puzzle.animating = false;
        updateStatus();
        if (callback) callback(continued && puzzle.status === 'running');
      });
    }
    
    // Count conflict-free (yellow) vertices
    function countConflictFree(graph) {
      return graph.nodes.filter(function(n) { return !n.intersection; }).length;
    }
    
    
    function updateStatus() {
      if (puzzles.length === 0) return;
      
      var p = puzzles[0];
      var graph = p.graph;
      var conflictFree = countConflictFree(graph);
      var clumps = findClumps(graph);
      var largestClump = clumps.length > 0 ? Math.max.apply(null, clumps.map(function(c) { return c.length; })) : 0;
      
      // Current position vs head position (0-indexed)
      // X/Y format: X = current, Y = head. If X < Y, you're rewound.
      var currentPos = p.historyIndex;
      var headPos = p.history.length - 1;
      var moveDisplay = 'move ' + currentPos + '/' + headPos;
      
      var statusText = p.count + ' crossings';
      statusText += ' | ' + conflictFree + '/' + graph.nodes.length + ' clear';
      statusText += ' | ' + clumps.length + ' clumps (max ' + largestClump + ')';
      statusText += ' | ' + moveDisplay;
      if (p.status === 'solved') statusText += ' | SOLVED!';
      if (p.status === 'escape-paused') statusText += ' | PAUSED (would escape #' + (p.escapeStuckCount || 1) + ') - make moves then Run';
      if (p.status === 'stuck') statusText += ' | STUCK';
      
      document.getElementById('status').textContent = statusText;
    }
    
    function updateGlobalStats() {
      puzzles.forEach(function(p) {
        if (p.status === 'solved' && !p.counted) {
          stats.totalSolved++;
          stats.totalMoves += p.moves;
          stats.bestSolve = Math.min(stats.bestSolve, p.moves);
          p.counted = true;
          
          // Track strategy success
          if (p.metrics && p.metrics.strategySuccess) {
            Object.keys(p.metrics.strategySuccess).forEach(function(k) {
              stats.strategyTotals[k] = (stats.strategyTotals[k] || 0) + p.metrics.strategySuccess[k];
            });
          }
        } else if (p.status === 'stuck' && !p.counted) {
          stats.totalStuck++;
          p.counted = true;
        }
      });
    }
    
    function start() {
      if (running) {
        running = false;
        document.getElementById('btn-run').textContent = 'Run';
        return;
      }
      
      running = true;
      document.getElementById('btn-run').textContent = 'Stop';
      
      function tick() {
        if (!running) return;
        
        var speed = parseInt(document.getElementById('speed').value);
        var delay = Math.max(10, 200 - speed * 2);
        
        stepAll(function(anyActive) {
          if (anyActive && running) {
            setTimeout(tick, delay);
          } else if (!anyActive) {
            running = false;
            document.getElementById('btn-run').textContent = 'Run';
          }
        });
      }
      tick();
    }
    
    document.getElementById('reset-btn').addEventListener('click', createPuzzles);
    
    // Step button - single auto move
    document.getElementById('btn-step').addEventListener('click', function() {
      if (puzzles.length > 0 && !puzzles[0].animating) {
        executeStep(puzzles[0], function() { updateStatus(); });
      }
    });
    
    // Run/Pause button
    document.getElementById('btn-run').addEventListener('click', start);
    
    // Compact button - run compact/relocate moves until no more found
    document.getElementById('btn-compact').addEventListener('click', function() {
      if (puzzles.length === 0) return;
      var puzzle = puzzles[0];
      var graph = puzzle.graph;
      var movesApplied = 0;
      var maxMoves = 50;  // limit to prevent infinite loops
      
      while (movesApplied < maxMoves) {
        var move = findCompactMove(graph);
        if (!move) {
          move = findRelocateMove(graph);
        }
        if (!move) break;
        
        move.node[0] = move.toX;
        move.node[1] = move.toY;
        puzzle.moves++;
        puzzle.lastStrategy = move.strategy;
        movesApplied++;
        
        intersections(graph.links);
        saveState(puzzle);
      }
      
      renderPuzzle(puzzle);
      updateStatus();
      console.log('Compact: applied ' + movesApplied + ' moves');
    });
    
    // Consolidate button - grow the largest cluster by pulling in nearby vertices
    document.getElementById('btn-consolidate').addEventListener('click', function() {
      if (puzzles.length === 0) return;
      var puzzle = puzzles[0];
      var graph = puzzle.graph;
      var movesApplied = 0;
      var maxMoves = 50;
      
      while (movesApplied < maxMoves) {
        var move = findConsolidateMove(graph);
        if (!move) break;
        
        move.node[0] = move.toX;
        move.node[1] = move.toY;
        puzzle.moves++;
        puzzle.lastStrategy = move.strategy;
        movesApplied++;
        
        intersections(graph.links);
        saveState(puzzle);
      }
      
      renderPuzzle(puzzle);
      updateStatus();
      console.log('Consolidate: applied ' + movesApplied + ' moves, cluster size: ' + (move ? move.clusterSize : 'max'));
    });
    
    // History buttons
    document.getElementById('btn-back').addEventListener('click', function() {
      if (puzzles.length > 0) goBack(puzzles[0]);
    });
    document.getElementById('btn-forward').addEventListener('click', function() {
      if (puzzles.length > 0) goForward(puzzles[0]);
    });
    
    // Vertex numbering toggle
    document.getElementById('show-numbers').addEventListener('change', function() {
      if (puzzles.length > 0) renderPuzzle(puzzles[0]);
    });
    
    function exportStats() {
      var report = {
        timestamp: new Date().toISOString(),
        summary: {
          totalSolved: stats.totalSolved,
          totalStuck: stats.totalStuck,
          solveRate: stats.totalSolved + stats.totalStuck > 0 
            ? ((stats.totalSolved / (stats.totalSolved + stats.totalStuck)) * 100).toFixed(1) + '%' 
            : '0%',
          totalMoves: stats.totalMoves,
          bestSolve: stats.bestSolve < Infinity ? stats.bestSolve : null,
          avgMovesPerSolve: stats.totalSolved > 0 
            ? (stats.totalMoves / stats.totalSolved).toFixed(1) 
            : null
        },
        strategyBreakdown: stats.strategyTotals,
        currentPuzzles: puzzles.map(function(p) {
          return {
            id: p.id,
            status: p.status,
            moves: p.moves,
            crossings: p.count,
            lastStrategy: p.lastStrategy,
            metrics: p.metrics
          };
        })
      };
      
      // Try to write to file (Electron) or download
      var json = JSON.stringify(report, null, 2);
      
      // Create download link
      var blob = new Blob([json], {type: 'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard-stats.json';
      a.click();
      URL.revokeObjectURL(url);
      
      // Also log to console
      console.log('Stats exported:', report);
    }
    
    // Auto-export every 30 seconds if running
    setInterval(function() {
      if (running && stats.totalSolved + stats.totalStuck > 0) {
        var report = {
          timestamp: new Date().toISOString(),
          totalSolved: stats.totalSolved,
          totalStuck: stats.totalStuck,
          solveRate: ((stats.totalSolved / (stats.totalSolved + stats.totalStuck)) * 100).toFixed(1) + '%',
          strategyTotals: stats.strategyTotals
        };
        console.log('Auto-stats:', report);
        
        // Try to write to file if in Node context
        if (typeof require !== 'undefined') {
          try {
            var fs = require('fs');
            fs.writeFileSync('dashboard-stats.json', JSON.stringify(report, null, 2));
          } catch(e) {}
        }
      }
    }, 30000);
    
    // ============ AI MOVE WATCHER ============
    // Watch for ai-move.json and apply moves from AI
    var lastAiMoveTime = 0;
    
    function checkAiMove() {
      if (typeof require === 'undefined') return;
      
      try {
        var fs = require('fs');
        var path = require('path');
        var filePath = path.join(__dirname || '.', 'ai-move.json');
        
        if (!fs.existsSync(filePath)) return;
        
        var stat = fs.statSync(filePath);
        var mtime = stat.mtimeMs;
        
        if (mtime > lastAiMoveTime) {
          lastAiMoveTime = mtime;
          
          var content = fs.readFileSync(filePath, 'utf8');
          var move = JSON.parse(content);
          
          if (puzzles.length > 0) {
            var puzzle = puzzles[0];
            var graph = puzzle.graph;
            
            // Handle selection: { "select": 5 }
            if (move.select !== undefined && move.select >= 0 && move.select < graph.nodes.length) {
              selectedNodeIndex = move.select;
              console.log('AI Select: vertex ' + move.select);
              renderPuzzle(puzzle);
              updateStatus();
              saveStateToFile(puzzle);
            }
            
            // Handle move: { "vertex": 5, "x": 0.3, "y": 0.7 }
            if (move.vertex !== undefined && move.x !== undefined && move.y !== undefined) {
              if (move.vertex >= 0 && move.vertex < graph.nodes.length) {
                var node = graph.nodes[move.vertex];
                var fromX = node[0], fromY = node[1];
                var crossingsBefore = puzzle.count;
                
                // Apply the move
                node[0] = Math.max(0.02, Math.min(0.98, move.x));
                node[1] = Math.max(0.02, Math.min(0.98, move.y));
                
                puzzle.moves++;
                puzzle.lastStrategy = 'ai';
                intersections(graph.links);
                var crossingsAfter = puzzle.count;
                
                console.log('AI Move: vertex ' + move.vertex + 
                  ' from (' + fromX.toFixed(3) + ',' + fromY.toFixed(3) + ')' +
                  ' to (' + node[0].toFixed(3) + ',' + node[1].toFixed(3) + ')');
                
                saveState(puzzle);
                renderPuzzle(puzzle);
                updateStatus();
                saveStateToFile(puzzle);
                
                // Log to move history
                logMoveHistory(puzzle.moves, move.vertex, fromX, fromY, node[0], node[1], crossingsBefore, crossingsAfter, 'ai');
              }
            }
          }
        }
      } catch(e) {
        // File doesn't exist or parse error - ignore
      }
    }
    
    // Poll for AI moves every 500ms (legacy file-based method)
    setInterval(checkAiMove, 500);
    
    // Listen for AI moves via IPC (preferred method)
    if (ipcRenderer) {
      ipcRenderer.on('ai-move', function(event, move) {
        console.log('Received AI move via IPC:', move);
        if (puzzles.length === 0) return;
        
        var puzzle = puzzles[0];
        var graph = puzzle.graph;
        
        if (move.select !== undefined && move.select >= 0 && move.select < graph.nodes.length) {
          selectedNodeIndex = move.select;
          renderPuzzle(puzzle);
          updateStatus();
          saveStateToFile(puzzle);
        }
        
        if (move.vertex !== undefined && move.x !== undefined && move.y !== undefined) {
          if (move.vertex >= 0 && move.vertex < graph.nodes.length) {
            var node = graph.nodes[move.vertex];
            node[0] = Math.max(0.02, Math.min(0.98, move.x));
            node[1] = Math.max(0.02, Math.min(0.98, move.y));
            puzzle.moves++;
            puzzle.lastStrategy = 'ai-ipc';
            intersections(graph.links);
            saveState(puzzle);
            renderPuzzle(puzzle);
            updateStatus();
            saveStateToFile(puzzle);
          }
        }
      });
      
      // Listen for load-graph to import graphs from dashboard dump
      ipcRenderer.on('load-graph', function(event, graphData) {
        console.log('Loading graph via IPC:', graphData.nodes.length, 'nodes,', graphData.edges.length, 'edges');
        
        // Reconstruct nodes as arrays with coordinates
        var newNodes = graphData.nodes.map(function(n) {
          return [n[0], n[1]];
        });
        
        // Reconstruct links as references to node objects
        var newLinks = graphData.edges.map(function(e) {
          return [newNodes[e[0]], newNodes[e[1]]];
        });
        
        var newGraph = { nodes: newNodes, links: newLinks };
        
        // If no puzzles exist, create the UI first
        if (puzzles.length === 0) {
          createPuzzles();
        }
        
        // Replace the first puzzle's graph
        var puzzle = puzzles[0];
        puzzle.graph = newGraph;
        puzzle.history = [];
        puzzle.moves = 0;
        puzzle.status = 'running';
        puzzle.movingNodeIndex = -1;
        puzzle.solverState = {};
        puzzle.initialCrossings = intersections(newGraph.links);
        
        selectedNodeIndex = -1;
        renderPuzzle(puzzle);
        updateStatus();
        saveStateToFile(puzzle);
        
        console.log('Graph loaded:', newGraph.nodes.length, 'nodes,', newGraph.links.length, 'edges,', puzzle.initialCrossings, 'crossings');
      });
    }
    
    // Initialize
    createPuzzles();
  </script>
</body>
</html>
