<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Planarity Solver Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 10px;
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
    }
    .controls {
      margin-bottom: 10px;
      padding: 10px;
      background: #333;
      border-radius: 5px;
    }
    .controls button {
      padding: 8px 16px;
      margin-right: 10px;
      cursor: pointer;
    }
    .controls label {
      margin-right: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
      height: calc(100vh - 70px);
    }
    .puzzle {
      background: #fff;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .puzzle svg {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .puzzle-header {
      background: #333;
      color: #fff;
      padding: 5px 10px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    .puzzle-header.solved {
      background: #060;
    }
    .puzzle-header.stuck {
      background: #600;
    }
    circle { cursor: default; }
  </style>
</head>
<body>
  <div class="controls">
    <label>Puzzles: <input type="number" id="num-puzzles" value="6" min="1" max="12" style="width:50px"></label>
    <label>Nodes: <input type="number" id="num-nodes" value="40" min="10" max="100" style="width:50px"></label>
    <label>Speed: <input type="range" id="speed" min="1" max="100" value="50" style="width:100px"></label>
    <button id="start-btn">Start</button>
    <button id="step-btn">Step All</button>
    <button id="reset-btn">Reset</button>
    <button id="export-btn">Export</button>
    <label><input type="checkbox" id="auto-replace" checked> Auto-replace</label>
    <span id="status" style="margin-left: 20px;"></span>
  </div>
  <div class="grid" id="grid"></div>

  <script src="solver.js"></script>
  <script>
    // Import from shared solver
    var intersections = Solver.intersections;
    var planarGraph = Solver.planarGraph;
    var scramble = Solver.scramble;
    var findBestMove = Solver.findBestMove;
    var findGridMove = Solver.findGridMove;
    var findEscapeMove = Solver.findEscapeMove;
    
    // Animate a node move
    function animateMove(puzzle, node, fromX, fromY, toX, toY, callback) {
      var duration = 120; // ms
      var startTime = Date.now();
      
      function frame() {
        var elapsed = Date.now() - startTime;
        var t = Math.min(1, elapsed / duration);
        // Ease out
        t = t * (2 - t);
        
        node[0] = fromX + (toX - fromX) * t;
        node[1] = fromY + (toY - fromY) * t;
        
        intersections(puzzle.graph.links);
        renderPuzzle(puzzle);
        
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          node[0] = toX;
          node[1] = toY;
          if (callback) callback();
        }
      }
      
      requestAnimationFrame(frame);
    }
    
    function solverStep(puzzle, callback) {
      var graph = puzzle.graph;
      puzzle.count = intersections(graph.links);
      
      if (puzzle.count === 0) {
        puzzle.status = 'solved';
        if (callback) callback(false);
        return;
      }
      
      // Track metrics
      if (!puzzle.metrics) {
        puzzle.metrics = { strategySuccess: {}, stuckRuns: 0, peakCrossings: puzzle.count };
      }
      puzzle.metrics.peakCrossings = Math.max(puzzle.metrics.peakCrossings, puzzle.count);
      if (!puzzle.solverState) puzzle.solverState = {};
      
      // Use shared solver - try grid for endgame, then wide random search
      var best = null;
      
      if (puzzle.count <= 15) {
        best = findGridMove(graph);
      }
      
      var randomMove = findBestMove(graph, 30);
      if (!best || (randomMove && randomMove.improvement > best.improvement)) {
        best = randomMove;
      }
      
      if (best && best.improvement > 0) {
        puzzle.moves++;
        puzzle.lastStrategy = best.strategy;
        puzzle.stuckCount = 0;
        puzzle.solverState.stuckCount = 0;
        puzzle.metrics.strategySuccess[best.strategy] = (puzzle.metrics.strategySuccess[best.strategy] || 0) + 1;
        
        // Animate the move
        animateMove(puzzle, best.node, best.fromX, best.fromY, best.toX, best.toY, function() {
          if (callback) callback(true);
        });
        return;
      } else {
        puzzle.stuckCount = (puzzle.stuckCount || 0) + 1;
        puzzle.solverState.stuckCount = (puzzle.solverState.stuckCount || 0) + 1;
        
        if (puzzle.stuckCount > 50) {
          puzzle.status = 'stuck';
          puzzle.metrics.stuckRuns++;
          if (callback) callback(false);
          return;
        }
        
        // Try escape
        var escape = findEscapeMove(graph);
        if (escape) {
          puzzle.moves++;
          puzzle.lastStrategy = 'escape';
          animateMove(puzzle, escape.node, escape.fromX, escape.fromY, escape.toX, escape.toY, function() {
            if (callback) callback(true);
          });
          return;
        }
        if (callback) callback(true);
      }
    }
    
    // ============ RENDERING ============
    
    function renderPuzzle(puzzle) {
      var svg = puzzle.svg;
      var w = puzzle.width, h = puzzle.height;
      var graph = puzzle.graph;
      puzzle.count = intersections(graph.links);
      
      var scaleX = function(v) { return 10 + v * (w - 20); };
      var scaleY = function(v) { return 10 + v * (h - 20); };
      
      // Clear
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      
      // Edges
      graph.links.forEach(function(link) {
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', scaleX(link[0][0]));
        line.setAttribute('y1', scaleY(link[0][1]));
        line.setAttribute('x2', scaleX(link[1][0]));
        line.setAttribute('y2', scaleY(link[1][1]));
        line.setAttribute('stroke', link.intersection ? '#000' : '#fc0');
        line.setAttribute('stroke-width', '0.8');
        svg.appendChild(line);
      });
      
      // Nodes
      graph.nodes.forEach(function(node, i) {
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', scaleX(node[0]));
        circle.setAttribute('cy', scaleY(node[1]));
        circle.setAttribute('r', '2');
        circle.setAttribute('fill', node.intersection ? '#0cf' : '#fc0');
        circle.setAttribute('stroke', '#000');
        circle.setAttribute('stroke-width', '0.5');
        svg.appendChild(circle);
      });
      
      // Update header
      var header = puzzle.header;
      header.className = 'puzzle-header' + (puzzle.status === 'solved' ? ' solved' : (puzzle.status === 'stuck' ? ' stuck' : ''));
      header.innerHTML = '<span>P' + puzzle.id + ' | ' + puzzle.count + ' crossings | ' + puzzle.moves + ' moves</span><span>' + (puzzle.lastStrategy || '-') + '</span>';
    }
    
    // ============ MAIN ============
    
    var puzzles = [];        // Displayed puzzles
    var backgroundPuzzles = []; // Additional puzzles running in background
    var running = false;
    var intervalId = null;
    var stats = { totalSolved: 0, totalStuck: 0, totalMoves: 0, bestSolve: Infinity, strategyTotals: {} };
    
    function createPuzzles() {
      var numPuzzles = parseInt(document.getElementById('num-puzzles').value) || 6;
      var numNodes = parseInt(document.getElementById('num-nodes').value) || 30;
      var grid = document.getElementById('grid');
      grid.innerHTML = '';
      puzzles = [];
      
      for (var i = 0; i < numPuzzles; i++) {
        var div = document.createElement('div');
        div.className = 'puzzle';
        
        var header = document.createElement('div');
        header.className = 'puzzle-header';
        header.textContent = 'Puzzle ' + i;
        div.appendChild(header);
        
        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 400 300');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        div.appendChild(svg);
        
        grid.appendChild(div);
        
        var graph = scramble(planarGraph(numNodes));
        var puzzle = {
          id: i,
          graph: graph,
          svg: svg,
          header: header,
          width: 400,
          height: 300,
          count: 0,
          moves: 0,
          status: 'running',
          lastStrategy: null,
          stuckCount: 0
        };
        puzzles.push(puzzle);
        renderPuzzle(puzzle);
      }
      
      updateStatus();
    }
    
    function stepAll(callback) {
      var numNodes = parseInt(document.getElementById('num-nodes').value) || 40;
      var autoReplace = document.getElementById('auto-replace').checked;
      var pending = 0;
      var anyActive = false;
      
      puzzles.forEach(function(puzzle, idx) {
        if (puzzle.status === 'running' && !puzzle.animating) {
          puzzle.animating = true;
          pending++;
          solverStep(puzzle, function(continued) {
            puzzle.animating = false;
            pending--;
            if (continued && puzzle.status === 'running') anyActive = true;
            
            if (pending === 0) {
              updateGlobalStats();
              updateStatus();
              if (callback) callback(anyActive);
            }
          });
        } else if (autoReplace && (puzzle.status === 'solved' || puzzle.status === 'stuck')) {
          if (!puzzle.replaceTimer) {
            puzzle.replaceTimer = setTimeout(function() {
              var newGraph = scramble(planarGraph(numNodes));
              puzzle.graph = newGraph;
              puzzle.count = 0;
              puzzle.moves = 0;
              puzzle.status = 'running';
              puzzle.lastStrategy = null;
              puzzle.stuckCount = 0;
              puzzle.counted = false;
              puzzle.metrics = null;
              puzzle.replaceTimer = null;
              puzzle.animating = false;
              puzzle.id = 'R' + (stats.totalSolved + stats.totalStuck);
              renderPuzzle(puzzle);
            }, 2000);
          }
          anyActive = true;
        }
      });
      
      // If no puzzles were stepped, still call callback
      if (pending === 0) {
        updateGlobalStats();
        updateStatus();
        if (callback) callback(anyActive);
      }
    }
    
    function updateStatus() {
      var solved = puzzles.filter(function(p) { return p.status === 'solved'; }).length;
      var stuck = puzzles.filter(function(p) { return p.status === 'stuck'; }).length;
      var running_count = puzzles.filter(function(p) { return p.status === 'running'; }).length;
      var batchMoves = puzzles.reduce(function(s, p) { return s + p.moves; }, 0);
      
      var statusText = 'Batch: ' + solved + ' solved, ' + stuck + ' stuck, ' + running_count + ' running | Moves: ' + batchMoves;
      statusText += ' || Cumulative: ' + stats.totalSolved + ' solved, ' + stats.totalStuck + ' stuck';
      if (stats.bestSolve < Infinity) statusText += ', best: ' + stats.bestSolve + ' moves';
      
      document.getElementById('status').textContent = statusText;
    }
    
    function updateGlobalStats() {
      puzzles.forEach(function(p) {
        if (p.status === 'solved' && !p.counted) {
          stats.totalSolved++;
          stats.totalMoves += p.moves;
          stats.bestSolve = Math.min(stats.bestSolve, p.moves);
          p.counted = true;
          
          // Track strategy success
          if (p.metrics && p.metrics.strategySuccess) {
            Object.keys(p.metrics.strategySuccess).forEach(function(k) {
              stats.strategyTotals[k] = (stats.strategyTotals[k] || 0) + p.metrics.strategySuccess[k];
            });
          }
        } else if (p.status === 'stuck' && !p.counted) {
          stats.totalStuck++;
          p.counted = true;
        }
      });
    }
    
    function start() {
      if (running) {
        running = false;
        document.getElementById('start-btn').textContent = 'Start';
        return;
      }
      
      running = true;
      document.getElementById('start-btn').textContent = 'Pause';
      
      function tick() {
        if (!running) return;
        
        var speed = parseInt(document.getElementById('speed').value);
        var delay = Math.max(10, 200 - speed * 2);
        
        stepAll(function(anyActive) {
          if (anyActive && running) {
            setTimeout(tick, delay);
          } else if (!anyActive) {
            running = false;
            document.getElementById('start-btn').textContent = 'Start';
          }
        });
      }
      tick();
    }
    
    document.getElementById('start-btn').addEventListener('click', start);
    document.getElementById('step-btn').addEventListener('click', function() { stepAll(); });
    document.getElementById('reset-btn').addEventListener('click', createPuzzles);
    document.getElementById('export-btn').addEventListener('click', exportStats);
    
    function exportStats() {
      var report = {
        timestamp: new Date().toISOString(),
        summary: {
          totalSolved: stats.totalSolved,
          totalStuck: stats.totalStuck,
          solveRate: stats.totalSolved + stats.totalStuck > 0 
            ? ((stats.totalSolved / (stats.totalSolved + stats.totalStuck)) * 100).toFixed(1) + '%' 
            : '0%',
          totalMoves: stats.totalMoves,
          bestSolve: stats.bestSolve < Infinity ? stats.bestSolve : null,
          avgMovesPerSolve: stats.totalSolved > 0 
            ? (stats.totalMoves / stats.totalSolved).toFixed(1) 
            : null
        },
        strategyBreakdown: stats.strategyTotals,
        currentPuzzles: puzzles.map(function(p) {
          return {
            id: p.id,
            status: p.status,
            moves: p.moves,
            crossings: p.count,
            lastStrategy: p.lastStrategy,
            metrics: p.metrics
          };
        })
      };
      
      // Try to write to file (Electron) or download
      var json = JSON.stringify(report, null, 2);
      
      // Create download link
      var blob = new Blob([json], {type: 'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard-stats.json';
      a.click();
      URL.revokeObjectURL(url);
      
      // Also log to console
      console.log('Stats exported:', report);
    }
    
    // Auto-export every 30 seconds if running
    setInterval(function() {
      if (running && stats.totalSolved + stats.totalStuck > 0) {
        var report = {
          timestamp: new Date().toISOString(),
          totalSolved: stats.totalSolved,
          totalStuck: stats.totalStuck,
          solveRate: ((stats.totalSolved / (stats.totalSolved + stats.totalStuck)) * 100).toFixed(1) + '%',
          strategyTotals: stats.strategyTotals
        };
        console.log('Auto-stats:', report);
        
        // Try to write to file if in Node context
        if (typeof require !== 'undefined') {
          try {
            var fs = require('fs');
            fs.writeFileSync('dashboard-stats.json', JSON.stringify(report, null, 2));
          } catch(e) {}
        }
      }
    }, 30000);
    
    // Initialize
    createPuzzles();
  </script>
</body>
</html>
